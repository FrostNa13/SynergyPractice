global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # Сам Prometheus следит за собой
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Метрики ОС: CPU, RAM, диск, сеть
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
